<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>View All Categories · Shubh Anime</title>
    <!-- Font Awesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* === base (reused from main) === */
        :root {
            --primary: #ff0055;
            --primary-dark: #d60047;
            --primary-glow: rgba(255, 0, 85, 0.45);
            --secondary: #00f0ff;
            --accent: #b800ff;
            --dark: #07070d;
            --darker: #040408;
            --dark-card: rgba(20, 20, 35, 0.55);
            --dark-card-hover: rgba(32, 32, 55, 0.8);
            --light-text: #f3f3f6;
            --gray-text: #a0a5b9;
            --gray-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 15px 45px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 25px rgba(255, 0, 85, 0.35);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --header-height: 76px;
            --gradient: linear-gradient(135deg, #ff0055 0%, #a200ff 50%, #00f0ff 100%);
            --gradient-dark: radial-gradient(circle at top, #14142b 0%, #040408 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 62.5%; scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gradient-dark);
            color: var(--light-text);
            line-height: 1.6;
            overflow-x: hidden;
            background-attachment: fixed;
        }
        ::selection { background: var(--primary); color: white; }
        
        /* ====== SCROLLBAR ====== */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--darker); }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            border: 2px solid var(--darker);
            transition: var(--transition);
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        .container { width: 100%; max-width: 1400px; margin: 0 auto; padding: 0 24px; }

        /* === header === */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height);
            background: rgba(4, 4, 8, 0.65); backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 35px; z-index: 1000; border-bottom: 1px solid var(--gray-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        .logo {
            display: flex; align-items: center;
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem; font-weight: 900; color: white; text-decoration: none;
            background: linear-gradient(to right, #fff 20%, var(--primary) 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: var(--transition);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .logo i {
            color: var(--primary); margin-right: 8px; font-size: 2.8rem; transition: var(--transition);
            -webkit-text-fill-color: var(--primary);
            filter: drop-shadow(0 0 8px var(--primary-glow));
        }
        .logo:hover { transform: scale(1.02); }
        .logo:hover i {
            transform: rotate(180deg) scale(1.1);
            color: var(--secondary);
            -webkit-text-fill-color: var(--secondary);
            filter: drop-shadow(0 0 12px var(--secondary));
        }

        .category-nav {
            display: flex; gap: 8px; background: rgba(255,255,255,0.03); padding: 6px 12px; border-radius: 40px;
            border: 1px solid var(--gray-border);
        }
        .cat-link {
            color: var(--gray-text); text-decoration: none; font-family: 'Outfit', sans-serif;
            font-size: 1.3rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
            padding: 8px 18px; border-radius: 30px; transition: var(--transition);
            display: inline-flex; align-items: center; gap: 6px;
            border: 1px solid transparent;
        }
        .cat-link i { font-size: 1.3rem; }
        .cat-link:hover, .cat-link.active-cat {
            color: white;
            background: rgba(255, 0, 85, 0.08);
            border-color: rgba(255, 0, 85, 0.15);
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }

        .back-home {
            background: rgba(255,255,255,0.05); border: 1px solid var(--gray-border);
            padding: 10px 22px; border-radius: 30px; color: white; text-decoration: none;
            font-family: 'Outfit', sans-serif; font-size: 1.4rem; font-weight: 700; transition: var(--transition);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .back-home i { margin-right: 8px; color: var(--primary); }
        .back-home:hover {
            border-color: var(--primary);
            background: rgba(255, 0, 85, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.15);
        }

        /* === dynamic page header === */
        .category-hero {
            margin-top: calc(var(--header-height) + 30px);
            margin-bottom: 25px;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 15px;
        }
        .category-title-block {
            display: flex; align-items: center; gap: 15px;
        }
        .category-icon {
            width: 60px; height: 60px; background: var(--dark-card); border-radius: 20px;
            display: flex; align-items: center; justify-content: center; font-size: 2.8rem;
            border: 1px solid var(--gray-border); color: var(--primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .category-title-block h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.4rem; font-weight: 900; letter-spacing: -0.5px;
            background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .results-count {
            background: rgba(255,255,255,0.03); padding: 8px 18px; border-radius: 40px;
            border: 1px solid var(--gray-border); font-family: 'Outfit', sans-serif;
            font-size: 1.4rem; color: var(--gray-text); font-weight: 600;
        }

        /* === sub filters === */
        .sub-filter-bar {
            display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 35px; align-items: center;
        }
        .sub-filter-btn {
            padding: 8px 20px; background: rgba(255,255,255,0.03); border: 1px solid var(--gray-border);
            color: var(--gray-text); border-radius: 30px; font-family: 'Outfit', sans-serif;
            font-size: 1.3rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
            cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; gap: 6px;
        }
        .sub-filter-btn i { font-size: 1.4rem; }
        .sub-filter-btn.active-sub, .sub-filter-btn:hover {
            background: var(--gradient); border-color: transparent; color: white;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.3);
            transform: translateY(-2px);
        }

        /* === grid === */
        .category-grid {
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 24px; margin-bottom: 50px;
        }
        .movie-card {
            background: var(--dark-card); border-radius: var(--radius); overflow: hidden;
            transition: var(--transition); position: relative; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            display: flex; flex-direction: column; border: 1px solid var(--gray-border);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .movie-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 20px rgba(255, 0, 85, 0.15);
            border-color: rgba(255, 0, 85, 0.3);
            background: var(--dark-card-hover);
        }
        .movie-poster {
            height: 240px; overflow: hidden; position: relative; flex-shrink: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .movie-poster img {
            width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .movie-card:hover .movie-poster img { transform: scale(1.08); }
        .movie-badge {
            position: absolute; top: 12px; left: 12px; background: rgba(255, 0, 85, 0.85);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            color: white; padding: 4px 10px; border-radius: 20px; font-family: 'Outfit', sans-serif;
            font-size: 1.1rem; font-weight: 700; text-transform: uppercase; z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 4px 12px rgba(255, 0, 85, 0.3);
        }
        .dubsub {
            position: absolute; top: 42px; left: 12px; background: rgba(0, 240, 255, 0.85);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            color: #040408; padding: 4px 10px; border-radius: 20px; font-family: 'Outfit', sans-serif;
            font-size: 1.1rem; font-weight: 750; text-transform: uppercase; z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 4px 12px rgba(0, 240, 255, 0.3);
        }
        .movie-rating {
            position: absolute; top: 12px; right: 12px; background: rgba(4, 4, 8, 0.8);
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            color: #ffd700; padding: 4px 10px; border-radius: 20px; font-family: 'Outfit', sans-serif;
            font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 4px; z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .movie-info { padding: 18px; flex: 1; display: flex; flex-direction: column; }
        .movie-title {
            font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 750; margin-bottom: 8px; line-height: 1.3;
            color: white; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            transition: var(--transition);
        }
        .movie-card:hover .movie-title { color: var(--primary); }
        .movie-meta { display: flex; justify-content: space-between; color: var(--gray-text); font-size: 1.2rem; margin-bottom: 10px; font-weight: 500; }
        .movie-desc { color: var(--gray-text); font-size: 1.25rem; line-height: 1.5; margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .movie-actions { display: flex; gap: 8px; margin-top: auto; }
        
        .btn-small {
            flex: 1; text-align: center; padding: 10px; border-radius: var(--radius-sm);
            font-family: 'Outfit', sans-serif; font-size: 1.4rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
            text-decoration: none; background: var(--gradient); background-size: 200% auto; color: white;
            transition: var(--transition); border: none; cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 0, 85, 0.2);
            min-height: 44px; display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-small i { margin-right: 6px; }
        .btn-small:hover {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 0, 85, 0.35);
        }

        .btn-watchlist-toggle {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--gray-border);
            color: var(--gray-text); padding: 10px; border-radius: var(--radius-sm);
            cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center;
            min-width: 44px; min-height: 44px;
        }
        .btn-watchlist-toggle:hover, .btn-watchlist-toggle.active {
            color: var(--primary); background: rgba(255, 0, 85, 0.1); border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.2); transform: scale(1.05);
        }

        .no-results {
            grid-column: 1 / -1; text-align: center; padding: 60px 20px; background: var(--dark-card);
            border-radius: var(--radius); font-family: 'Outfit', sans-serif; font-size: 2rem; color: var(--gray-text);
            border: 1px solid var(--gray-border);
        }
        .footer-bottom {
            background: var(--darker); padding: 30px 0; text-align: center; border-top: 1px solid var(--gray-border);
            font-family: 'Outfit', sans-serif; font-size: 1.4rem; color: var(--gray-text); margin-top: 30px;
        }

        /* Mobile Sticky Bottom Tab Bar */
        .mobile-tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(10, 10, 18, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: none;
            justify-content: space-around;
            align-items: center;
            z-index: 2000;
            padding-bottom: env(safe-area-inset-bottom, 0px);
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.5);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--gray-text);
            text-decoration: none;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            transition: var(--transition);
            min-width: 44px;
            min-height: 44px;
            flex: 1;
            padding-top: 5px;
        }

        .tab-item i {
            font-size: 1.8rem;
            margin-bottom: 3px;
            transition: var(--transition);
        }

        .tab-item:hover, .tab-item.active {
            color: var(--primary);
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }

        /* Mobile Search Overlay */
        .mobile-search-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 18, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 2100;
            display: none;
            flex-direction: column;
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top, 0px));
        }

        .mobile-search-overlay.active {
            display: flex;
        }

        .search-overlay-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            padding: 8px;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-input-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
        }

        .search-input-wrapper input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 12px 45px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            outline: none;
            transition: var(--transition);
        }

        .search-input-wrapper input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.25);
        }

        .search-input-wrapper .search-icon {
            position: absolute;
            left: 18px;
            color: var(--gray-text);
            font-size: 1.6rem;
        }

        .search-clear-btn {
            position: absolute;
            right: 15px;
            background: none;
            border: none;
            color: var(--gray-text);
            font-size: 1.6rem;
            cursor: pointer;
            padding: 8px;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-overlay-results {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        /* Mobile-First Responsive Wrapping Grid */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        @media (max-width: 360px) {
            .category-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (min-width: 576px) {
            .category-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 16px;
            }
            .movie-poster {
                height: 220px;
            }
        }

        @media (min-width: 768px) {
            .category-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
            }
            .movie-poster {
                height: 240px;
            }
        }

        @media (min-width: 992px) {
            .category-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 24px;
            }
            .movie-poster {
                height: 280px;
            }
            header {
                padding: 0 35px;
            }
        }

        @media (min-width: 992px) and (max-width: 1200px) {
            .cat-link {
                padding: 6px 12px;
                font-size: 1.2rem;
            }
            .category-nav {
                gap: 4px;
                padding: 4px 8px;
            }
            .logo {
                font-size: 2.2rem;
            }
        }

        .drawer-close {
            display: none;
        }

        .nav-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(4, 4, 8, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2400;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }

        .nav-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .mobile-toggle {
            display: none;
            font-size: 2.4rem;
            color: white;
            cursor: pointer;
            transition: var(--transition);
        }

        .mobile-toggle:hover {
            color: var(--primary);
            transform: scale(1.1);
        }

        @media (max-width: 992px) {
            header {
                padding: 0 20px;
                height: 64px;
            }

            .logo {
                font-size: 2.0rem;
            }

            .logo i {
                font-size: 2.2rem;
            }

            .back-home {
                padding: 8px 16px;
                font-size: 1.2rem;
            }

            /* Turn category-nav into a glassmorphic sidebar drawer */
            .category-nav {
                position: fixed;
                top: 0;
                right: -300px;
                width: 280px;
                height: 100vh;
                background: rgba(10, 10, 18, 0.96);
                backdrop-filter: blur(25px);
                -webkit-backdrop-filter: blur(25px);
                display: flex !important;
                flex-direction: column;
                align-items: flex-start;
                padding: 30px 24px 80px 24px;
                gap: 12px;
                z-index: 2500;
                box-shadow: -10px 0 30px rgba(0, 0, 0, 0.6);
                transition: var(--transition);
                border-left: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 0;
                overflow-y: auto;
            }

            .category-nav.active {
                right: 0;
            }

            .category-nav-links {
                display: flex;
                flex-direction: column;
                gap: 10px;
                width: 100%;
            }

            .cat-link {
                width: 100%;
                padding: 12px 18px;
                border-radius: var(--radius-sm);
                font-size: 1.4rem;
                justify-content: flex-start;
                text-transform: none;
                letter-spacing: 0.5px;
            }

            /* Close button in drawer */
            .drawer-close {
                display: flex;
                align-self: flex-end;
                font-size: 2.0rem;
                color: var(--gray-text);
                cursor: pointer;
                transition: var(--transition);
                margin-bottom: 15px;
                width: 40px;
                height: 40px;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid var(--gray-border);
            }

            .drawer-close:hover {
                color: white;
                background: rgba(255, 0, 85, 0.1);
                border-color: var(--primary);
                transform: rotate(90deg);
            }

            /* Enable and style hamburger toggle */
            .mobile-toggle {
                display: flex !important;
                align-items: center;
                justify-content: center;
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid var(--gray-border);
                font-size: 1.8rem;
                cursor: pointer;
            }

            .mobile-toggle:hover {
                color: var(--primary);
                background: rgba(255, 0, 85, 0.1);
                border-color: var(--primary);
            }
        }

        @media (max-width: 768px) {
            .mobile-tab-bar {
                display: flex;
            }
            body {
                padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px));
            }
        }
        
        @media (max-width: 576px) {
            .logo {
                font-size: 1.8rem;
            }
            .logo i {
                font-size: 2.0rem;
            }
            .back-home {
                padding: 6px 12px;
                font-size: 1.1rem;
            }
            .movie-info {
                padding: 12px;
            }
            .movie-actions {
                gap: 6px;
            }
            .btn-small {
                padding: 8px 12px;
                font-size: 1.1rem;
                min-height: 36px;
            }
            .btn-watchlist-toggle {
                min-width: 36px !important;
                min-height: 36px !important;
                padding: 6px !important;
            }
        }

        /* ====== SKELETON LOADING AESTHETICS ====== */
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }

        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.03) 25%, rgba(255, 255, 255, 0.08) 50%, rgba(255, 255, 255, 0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite linear;
            display: inline-block;
        }

        .skeleton-card {
            background: rgba(20, 20, 35, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: var(--radius);
            overflow: hidden;
            padding: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .skeleton-card-poster {
            width: 100%;
            height: 300px;
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .skeleton-card-info {
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .skeleton-card-title {
            width: 80%;
            height: 18px;
            border-radius: 4px;
        }

        .skeleton-card-meta {
            width: 50%;
            height: 14px;
            border-radius: 4px;
            margin-bottom: 5px;
        }

        .skeleton-card-desc {
            width: 100%;
            height: 30px;
            border-radius: 4px;
        }

        .skeleton-card-actions {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }

        .skeleton-card-btn {
            flex: 1;
            height: 36px;
            border-radius: var(--radius-sm);
        }

        .skeleton-card-fav {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-overlay" id="navOverlay"></div>
        <a href="#" class="logo" onclick="window.location.href='index.html'; return false;"><i class="fas fa-infinity"></i>Infinx Anime</a>
        
        <div class="category-nav" id="categoryNav">
            <div class="drawer-close" id="closeDrawer"><i class="fas fa-times"></i></div>
            <div class="category-nav-links" id="categoryNavLinks">
                <!-- js will populate links based on current category -->
            </div>
        </div>

        <div style="display: flex; align-items: center; gap: 10px;">
            <a href="javascript:history.back()" class="back-home"><i class="fas fa-arrow-left"></i> Back</a>
            <div class="mobile-toggle" id="mobileToggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- dynamic category hero -->
        <div class="category-hero" id="categoryHero">
            <!-- filled by js -->
        </div>

        <!-- sub filters (like "newest", "top rated", "season") specific to category, will be customized per page -->
        <div class="sub-filter-bar" id="subFilterBar"></div>

        <!-- movie grid -->
        <div class="category-grid" id="categoryGrid"></div>
    </div>

    <div class="footer-bottom">
        <i class="fas fa-crown" style="color: #ff0055;"></i> Shubh Anime · category view
    </div>

    <!-- ====== MOBILE SEARCH OVERLAY ====== -->
    <div class="mobile-search-overlay" id="mobileSearchOverlay">
        <div class="search-overlay-header">
            <button class="search-back-btn" id="closeSearchOverlay" aria-label="Close search"><i class="fas fa-arrow-left"></i></button>
            <div class="search-input-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="mobileSearchInput" placeholder="Search anime, movies...">
                <button class="search-clear-btn" id="clearMobileSearch" aria-label="Clear text" style="display: none;"><i class="fas fa-times"></i></button>
            </div>
        </div>
        <div class="search-overlay-results" id="mobileSearchResults"></div>
    </div>

    <!-- ====== MOBILE BOTTOM TAB BAR ====== -->
    <nav class="mobile-tab-bar">
        <a href="index.html" class="tab-item" id="tabHome"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="#" class="tab-item" id="tabSearch"><i class="fas fa-search"></i><span>Search</span></a>
        <a href="#watchlist" class="tab-item" id="tabWatchlist"><i class="fas fa-heart"></i><span>Watchlist</span></a>
        <a href="#history" class="tab-item" id="tabHistory"><i class="fas fa-history"></i><span>History</span></a>
    </nav>

    <script>
        (async function() {
            const API_BASE = '/api';
            const fallbackPoster = "https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=500";

            // Get category or search from URL (hash), default to 'action'
            let hash = window.location.hash.substring(1) || 'action';
            let currentCategory = hash;
            let searchQuery = '';

            if (hash.startsWith('search?q=')) {
                currentCategory = 'search';
                searchQuery = decodeURIComponent(hash.substring(9));
            }

            const token = localStorage.getItem('infinx_token');
            const headers = token ? { 'Authorization': `Bearer ${token}` } : {};

            const catInfo = {
                action: { name: 'Action Movies', icon: 'fa-fire', color: '#ff0055' },
                anime: { name: 'Anime Series', icon: 'fa-play-circle', color: '#00a8ff' },
                hollywood: { name: 'Hollywood Movies', icon: 'fa-film', color: '#9c27b0' },
                'web-series': { name: 'Web Series', icon: 'fa-tv', color: '#2ecc71' },
                horror: { name: 'Horror Movies', icon: 'fa-ghost', color: '#2c3e50' },
                kids: { name: 'Kids & Family', icon: 'fa-child', color: '#f1c40f' },
                kdrama: { name: 'Korean Drama', icon: 'fa-k', color: '#e67e22' },
                watchlist: { name: 'My Watchlist', icon: 'fa-heart', color: '#ff0055' },
                history: { name: 'Watch History', icon: 'fa-history', color: '#00a8ff' }
            };

            if (currentCategory !== 'search' && !catInfo[currentCategory]) {
                currentCategory = 'action';
            }

            // Build category navigation (top header)
            const navContainer = document.getElementById('categoryNavLinks') || document.getElementById('categoryNav');
            let navHtml = '';
            for (let [key, info] of Object.entries(catInfo)) {
                if ((key === 'watchlist' || key === 'history') && !token) continue;
                const activeClass = (key === currentCategory) ? 'active-cat' : '';
                navHtml += `<a href="#${key}" class="cat-link ${activeClass}" data-cat="${key}"><i class="fas ${info.icon}"></i>${info.name.split(' ')[0]}</a>`;
            }
            navContainer.innerHTML = navHtml;

            // Navigation click listeners
            document.querySelectorAll('.cat-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const newCat = link.dataset.cat;
                    window.location.hash = newCat;
                    window.location.reload();
                });
            });

            // Set bottom tab active classes
            const tabHome = document.getElementById('tabHome');
            const tabWatchlist = document.getElementById('tabWatchlist');
            const tabHistory = document.getElementById('tabHistory');

            if (currentCategory === 'watchlist') {
                tabWatchlist.classList.add('active');
            } else if (currentCategory === 'history') {
                tabHistory.classList.add('active');
            }

            // Set hero area
            const hero = document.getElementById('categoryHero');
            if (currentCategory === 'search') {
                hero.innerHTML = `
                    <div class="category-title-block">
                        <div class="category-icon"><i class="fas fa-search" style="color: var(--primary);"></i></div>
                        <h1>Search Results: "${searchQuery}"</h1>
                    </div>
                    <div class="results-count" id="catResultCount">Loading...</div>
                `;
            } else {
                const currentInfo = catInfo[currentCategory];
                hero.innerHTML = `
                    <div class="category-title-block">
                        <div class="category-icon"><i class="fas ${currentInfo.icon}" style="color: ${currentInfo.color};"></i></div>
                        <h1>${currentInfo.name}</h1>
                    </div>
                    <div class="results-count" id="catResultCount">Loading...</div>
                `;
            }

            // Build sub filters based on category
            const subBar = document.getElementById('subFilterBar');
            let subHtml = '';
            if (['watchlist', 'history', 'search'].includes(currentCategory)) {
                subHtml = ''; // no subfilters for watchlist, history, and search
            } else if (['action', 'hollywood', 'horror'].includes(currentCategory)) {
                subHtml = `
                    <button class="sub-filter-btn active-sub" data-sub="all"><i class="fas fa-list"></i> All</button>
                    <button class="sub-filter-btn" data-sub="new"><i class="fas fa-bolt"></i> New Releases</button>
                    <button class="sub-filter-btn" data-sub="rated"><i class="fas fa-star"></i> Top Rated</button>
                `;
            } else {
                subHtml = `
                    <button class="sub-filter-btn active-sub" data-sub="all"><i class="fas fa-list"></i> All</button>
                    <button class="sub-filter-btn" data-sub="series"><i class="fas fa-tv"></i> Series</button>
                    <button class="sub-filter-btn" data-sub="movie"><i class="fas fa-film"></i> Movies</button>
                    <button class="sub-filter-btn" data-sub="new"><i class="fas fa-bolt"></i> Latest</button>
                `;
            }
            subBar.innerHTML = subHtml;

            let userWatchlist = [];

            // Get watchlist if logged in
            if (token) {
                try {
                    const wlRes = await fetch(`${API_BASE}/user/watchlist`, { headers });
                    if (wlRes.ok) {
                        const wlData = await wlRes.json();
                        userWatchlist = wlData.map(s => s.id);
                    }
                } catch (e) {
                    console.error('Error fetching watchlist:', e);
                }
            }

            // Pre-populate category grid with skeletons
            const grid = document.getElementById('categoryGrid');
            if (grid) {
                let skeletonHtml = '';
                for (let i = 0; i < 12; i++) {
                    skeletonHtml += `
                        <div class="movie-card skeleton-card">
                            <div class="skeleton skeleton-card-poster" style="height: 240px;"></div>
                            <div class="skeleton-card-info" style="padding: 12px;">
                                <div class="skeleton skeleton-card-title" style="margin-bottom: 8px;"></div>
                                <div class="skeleton skeleton-card-meta" style="margin-bottom: 8px;"></div>
                                <div class="skeleton skeleton-card-desc" style="margin-bottom: 12px; height: 35px;"></div>
                                <div class="skeleton-card-actions">
                                    <div class="skeleton skeleton-card-btn" style="min-height: 36px; height: 36px;"></div>
                                    <div class="skeleton skeleton-card-fav" style="min-height: 36px; height: 36px; min-width: 36px;"></div>
                                </div>
                            </div>
                        </div>
                    `;
                }
                grid.innerHTML = skeletonHtml;
            }

            // Fetch content from backend API
            let categoryMovies = [];
            try {
                if (currentCategory === 'search') {
                    const res = await fetch(`${API_BASE}/shows/search?q=${encodeURIComponent(searchQuery)}`);
                    if (!res.ok) throw new Error('Search request failed');
                    categoryMovies = await res.json();
                } else if (currentCategory === 'watchlist') {
                    if (!token) {
                        document.getElementById('catResultCount').innerText = '0 titles';
                        document.getElementById('categoryGrid').innerHTML = `
                            <div class="no-results">
                                <i class="fas fa-lock" style="color: var(--primary); font-size: 3rem; margin-bottom: 15px;"></i><br />
                                Please log in from the home page to view your Watchlist.
                            </div>`;
                        return;
                    }
                    const res = await fetch(`${API_BASE}/user/watchlist`, { headers });
                    if (!res.ok) throw new Error('Watchlist request failed');
                    categoryMovies = await res.json();
                } else if (currentCategory === 'history') {
                    if (!token) {
                        document.getElementById('catResultCount').innerText = '0 titles';
                        document.getElementById('categoryGrid').innerHTML = `
                            <div class="no-results">
                                <i class="fas fa-lock" style="color: var(--primary); font-size: 3rem; margin-bottom: 15px;"></i><br />
                                Please log in from the home page to view your Watch History.
                            </div>`;
                        return;
                    }
                    const res = await fetch(`${API_BASE}/user/history`, { headers });
                    if (!res.ok) throw new Error('History request failed');
                    const historyData = await res.json();
                    
                    // We map history items so they can be rendered as movie cards!
                    categoryMovies = historyData.map(item => {
                        const show = item.episode.show;
                        const percent = (item.progress / item.duration) * 100;
                        return {
                            ...show,
                            historyPercent: percent,
                            episodeId: item.episodeId,
                            episodeNumber: item.episode.episodeNumber
                        };
                    });
                } else {
                    const res = await fetch(`${API_BASE}/shows/categories`);
                    if (!res.ok) throw new Error('API request failed');
                    const categoriesData = await res.json();
                    
                    // Find matching category data
                    const matchedCategory = categoriesData.find(c => c.slug === currentCategory);
                    if (matchedCategory) {
                        categoryMovies = matchedCategory.shows;
                    }
                }
            } catch (error) {
                console.error('Error loading shows API:', error);
                document.getElementById('catResultCount').innerText = '0 titles';
                document.getElementById('categoryGrid').innerHTML = `<div class="no-results" style="color:var(--primary);"><i class="fas fa-exclamation-triangle"></i><br />Failed to load content</div>`;
                return;
            }

            // Render function with subfiltering
            function renderCategory(subFilter = 'all') {
                let filtered = categoryMovies;
                
                if (currentCategory !== 'watchlist' && currentCategory !== 'history') {
                    if (subFilter === 'new') {
                        filtered = categoryMovies.filter(m => m.badge === 'NEW' || m.year >= '2023');
                    } else if (subFilter === 'rated') {
                        filtered = [...categoryMovies].sort((a,b) => b.rating - a.rating).slice(0, 20);
                    } else if (subFilter === 'series') {
                        filtered = categoryMovies.filter(m => m.type === 'series');
                    } else if (subFilter === 'movie') {
                        filtered = categoryMovies.filter(m => m.type === 'movie');
                    }
                }

                // Update result count
                document.getElementById('catResultCount').innerText = filtered.length + ' titles';

                if (filtered.length === 0) {
                    document.getElementById('categoryGrid').innerHTML = `<div class="no-results"><i class="fas fa-folder-open"></i><br />No titles match</div>`;
                    return;
                }

                let gridHtml = '';
                filtered.forEach(m => {
                    let watchLink = '#';
                    let playBtnText = '';
                    let watchDisabled = '';
                    
                    if (currentCategory === 'history') {
                        watchLink = `/video-player/index.html?episodeId=${m.episodeId}`;
                        playBtnText = '<i class="fas fa-play"></i> Resume';
                    } else {
                        const hasEpisodes = m.episodes && m.episodes.length > 0;
                        watchLink = hasEpisodes ? `/video-player/index.html?episodeId=${m.episodes[0].id}` : '#';
                        watchDisabled = !hasEpisodes ? ' style="opacity:0.5; pointer-events:none;"' : '';
                        playBtnText = hasEpisodes ? '<i class="fas fa-play"></i> Watch' : 'Soon';
                    }
                    
                    const isFav = userWatchlist.includes(m.id) ? 'active' : '';
                    
                    let progressHtml = '';
                    if (m.historyPercent !== undefined) {
                        progressHtml = `
                            <div class="progress-container" style="width: 100%; height: 4px; background: rgba(255, 255, 255, 0.08); border-radius: 2px; margin-top: 12px; overflow: hidden;">
                                <div class="progress-bar-fill" style="height: 100%; background: var(--gradient); width: ${m.historyPercent}%"></div>
                            </div>
                            <div style="font-size: 1.1rem; color: var(--gray-text); margin-top: 5px; text-align: right;">
                                Ep ${m.episodeNumber} · ${Math.round(m.historyPercent)}% watched
                            </div>
                        `;
                    }
                    
                    gridHtml += `
                    <div class="movie-card">
                        <div class="movie-poster">
                            <div class="movie-badge">${m.badge || 'HD'}</div>
                            ${m.dubsub ? `<div class="dubsub">Sub/Dub</div>` : ''}
                            <div class="movie-rating"><i class="fas fa-star"></i> ${m.rating}</div>
                            <img src="${m.poster}" alt="${m.title}" onerror="this.src='${fallbackPoster}'">
                        </div>
                        <div class="movie-info">
                            <h3 class="movie-title">${m.title}</h3>
                            <div class="movie-meta">
                                <span>${m.year}</span>
                                <span>${m.runtime}</span>
                            </div>
                            <p class="movie-desc">${m.description}</p>
                            ${progressHtml}
                            <div class="movie-actions" style="margin-top: auto; padding-top: 10px;">
                                <a href="${watchLink}" class="btn-small" ${watchDisabled}>${playBtnText}</a>
                                <button class="btn-watchlist-toggle ${isFav}" onclick="toggleWatchlistItem(this, ${m.id})">
                                    <i class="${userWatchlist.includes(m.id) ? 'fas fa-heart' : 'far fa-heart'}"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    `;
                });
                document.getElementById('categoryGrid').innerHTML = gridHtml;
            }



            // Mobile Search Overlay listeners
            const tabSearch = document.getElementById('tabSearch');
            const mobileSearchOverlay = document.getElementById('mobileSearchOverlay');
            const closeSearchOverlay = document.getElementById('closeSearchOverlay');
            const clearMobileSearch = document.getElementById('clearMobileSearch');
            const mobileSearchInput = document.getElementById('mobileSearchInput');

            tabSearch.addEventListener('click', (e) => {
                e.preventDefault();
                mobileSearchOverlay.classList.add('active');
                mobileSearchInput.focus();
            });

            closeSearchOverlay.addEventListener('click', () => {
                mobileSearchOverlay.classList.remove('active');
            });

            mobileSearchInput.addEventListener('input', function() {
                if (this.value.trim()) {
                    clearMobileSearch.style.display = 'flex';
                } else {
                    clearMobileSearch.style.display = 'none';
                }
            });

            clearMobileSearch.addEventListener('click', () => {
                mobileSearchInput.value = '';
                clearMobileSearch.style.display = 'none';
                mobileSearchInput.focus();
            });

            mobileSearchInput.addEventListener('keyup', function(e) {
                if (e.key === 'Enter') {
                    const term = this.value.trim();
                    if (term) {
                        mobileSearchOverlay.classList.remove('active');
                        window.location.hash = `search?q=${encodeURIComponent(term)}`;
                    }
                }
            });

            // Initial render
            renderCategory('all');

            // Attach subfilter button clicks
            document.querySelectorAll('.sub-filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.sub-filter-btn').forEach(b => b.classList.remove('active-sub'));
                    btn.classList.add('active-sub');
                    renderCategory(btn.dataset.sub);
                });
            });

            // Toggle watchlist handler (exposed globally for onclick)
            window.toggleWatchlistItem = async function(btn, showId) {
                if (!token) {
                    alert('Please log in from the home page to save favorites.');
                    return;
                }
                try {
                    const toggleRes = await fetch(`${API_BASE}/user/watchlist`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            ...headers
                        },
                        body: JSON.stringify({ showId })
                    });
                    if (toggleRes.ok) {
                        const data = await toggleRes.json();
                        if (data.status === 'added') {
                            btn.classList.add('active');
                            btn.querySelector('i').className = 'fas fa-heart';
                            userWatchlist.push(showId);
                        } else {
                            btn.classList.remove('active');
                            btn.querySelector('i').className = 'far fa-heart';
                            userWatchlist = userWatchlist.filter(id => id !== showId);
                        }
                    }
                } catch (e) {
                    console.error(e);
                }
            };

            // Mobile Menu Toggle for view.html
            const mobileToggle = document.getElementById('mobileToggle');
            const categoryNav = document.getElementById('categoryNav');
            const closeDrawer = document.getElementById('closeDrawer');
            const navOverlay = document.getElementById('navOverlay');

            function openMobileMenu() {
                categoryNav.classList.add('active');
                navOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeMobileMenu() {
                categoryNav.classList.remove('active');
                navOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            if (mobileToggle) mobileToggle.addEventListener('click', openMobileMenu);
            if (closeDrawer) closeDrawer.addEventListener('click', closeMobileMenu);
            if (navOverlay) navOverlay.addEventListener('click', closeMobileMenu);

            // Close menu when clicking any category link inside the drawer (only on mobile)
            const catLinks = document.querySelectorAll('.category-nav .cat-link');
            catLinks.forEach(link => {
                link.addEventListener('click', () => {
                    if (window.innerWidth <= 992) {
                        closeMobileMenu();
                    }
                });
            });

            // Reload page on hashchange to correctly refresh content grids (watchlist, history, categories)
            window.addEventListener('hashchange', () => {
                window.location.reload();
            });
        })();
    </script>
</body>
</html>
